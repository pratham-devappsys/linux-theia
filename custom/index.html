<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Editor</title>

  <style>
    /* Hide Activity Bar */
    .lm-TabBar[data-orientation="vertical"] {
      display: none !important;
    }

    /* Hide sidebar icons */
    .lm-Widget.theia-sidebar-menu i {
      display: none !important;
    }

    /* Hide sidebar completely */
    .theia-sidebar {
      display: none !important;
    }

    /* Hide status bar */
    .theia-statusBar {
      display: none !important;
    }

     .lm-TabBar[data-orientation="horizontal"] .theia-tabBar-tab-row {
  display: flex !important;   /* show again */
  flex-flow: row nowrap;
  width: 100%;
}


.lm-TabBar-toolbar {
  z-index: var(--theia-tabbar-toolbar-z-index);
  display: none !important;   /* show again */
  flex-direction: row-reverse;
  align-items: center;
  justify-content: center;
  padding-inline: var(--theia-ui-padding);
  gap: 2px;
}
  </style>

</head>

<body>
  <div class="theia-preload">./resources/preload.html</div>
  <script src="./bundle.js"></script>
</body>
</html>
